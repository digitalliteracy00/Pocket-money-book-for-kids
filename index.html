<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반짝반짝 용돈 기입장</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #fdf6e3;
            color: #444;
            padding: 10px;
        }
        .diary-container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fffde7;
            border: 6px solid #ffcc00;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 10px 0 #e6b800;
        }
        .diary-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .diary-table th {
            background-color: #ffe082;
            padding: 12px;
            border: 2px solid #ffcc00;
            font-size: 1.2rem;
        }
        .diary-table td {
            border: 2px solid #fff59d;
            padding: 10px;
            text-align: center;
            height: 50px;
            font-size: 1.1rem;
        }
        .btn-action {
            transition: all 0.2s;
            box-shadow: 0 4px 0 #d97706;
        }
        .btn-action:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .category-btn {
            border: 3px solid #fde68a;
            border-radius: 20px;
            padding: 10px;
            background: white;
        }
        .category-btn.active {
            background-color: #fef3c7;
            border-color: #fbbf24;
            transform: scale(1.05);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="diary-container">
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-2">
            <span class="text-4xl">🐷</span>
            <h1 class="text-4xl text-orange-600">용돈 기입장</h1>
        </div>
        <div class="text-xl bg-white px-4 py-2 rounded-full border-2 border-yellow-400">
            날짜: 5월 <span id="current-day">1</span>일
        </div>
    </div>

    <div id="game-screen">
        <div class="bg-white p-4 rounded-2xl mb-4 border-2 border-yellow-200 shadow-inner">
            <p class="text-center text-lg mb-3 text-orange-500">👇 오늘 있었던 일을 누르고 [남은 돈]을 계산해 보세요!</p>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                <button onclick="askBalance('엄마 심부름', 1000, 0)" class="btn-action bg-blue-400 text-white p-2 rounded-xl text-lg">🧹 심부름 (+1000원)</button>
                <button onclick="askBalance('맛있는 사탕', 0, 500)" class="btn-action bg-pink-400 text-white p-2 rounded-xl text-lg">🍭 사탕사기 (-500원)</button>
                <button onclick="askBalance('공책과 연필', 0, 1000)" class="btn-action bg-green-400 text-white p-2 rounded-xl text-lg">✏️ 학용품 (-1000원)</button>
                <button onclick="askBalance('칭찬 용돈', 2000, 0)" class="btn-action bg-yellow-500 text-white p-2 rounded-xl text-lg">🌟 칭찬 (+2000원)</button>
            </div>
        </div>

        <table class="diary-table mb-4">
            <thead>
                <tr>
                    <th width="15%">날짜</th>
                    <th width="35%">무엇을 샀나요?</th>
                    <th width="15%">받은 돈</th>
                    <th width="15%">쓴 돈</th>
                    <th width="20%">남은 돈</th>
                </tr>
            </thead>
            <tbody id="ledger-body">
                </tbody>
        </table>

        <div class="bg-orange-100 p-4 rounded-2xl border-2 border-orange-300 flex justify-around items-center">
            <div class="text-xl">💰 총 받은 돈: <span id="total-income" class="text-blue-600">0</span>원</div>
            <div class="text-xl">💸 총 쓴 돈: <span id="total-expense" class="text-red-600">0</span>원</div>
            <div class="text-xl font-bold">✨ 지금 지갑에 남은 돈: <span id="total-balance" class="text-orange-700">0</span>원</div>
        </div>

        <button onclick="showReview()" id="finish-btn" class="hidden w-full mt-6 py-4 bg-orange-500 text-white text-2xl rounded-3xl btn-action">📊 한 달 결산하고 반성하기</button>
    </div>

    <div id="review-screen" class="hidden space-y-6">
        <h2 class="text-3xl text-center text-orange-600 mb-6">📔 나의 한 달 마음 기록장</h2>

        <div class="bg-white p-5 rounded-3xl border-2 border-yellow-300">
            <h3 class="text-2xl mb-4">⭐ 나는 무엇에 돈을 많이 썼을까요? (하나 선택)</h3>
            <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                <button class="category-btn" onclick="selectCate(this)">🍰<br>간식</button>
                <button class="category-btn" onclick="selectCate(this)">🧸<br>장난감</button>
                <button class="category-btn" onclick="selectCate(this)">✏️<br>학용품</button>
                <button class="category-btn" onclick="selectCate(this)">🎁<br>선물</button>
                <button class="category-btn" onclick="selectCate(this)">🐖<br>저금</button>
                <button class="category-btn" onclick="selectCate(this)">❓<br>기타</button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl border-2 border-yellow-300 text-center">
            <h3 class="text-2xl mb-2">💰 지금 지갑에 진짜 남은 돈은?</h3>
            <div class="text-4xl text-blue-600 underline" id="final-balance-display">0원</div>
        </div>

        <div class="bg-white p-5 rounded-3xl border-2 border-yellow-300">
            <h3 class="text-2xl mb-4 text-center">💡 나는 합리적으로 소비했나요?</h3>
            <div class="flex justify-around">
                <button onclick="selectHappy(this)" class="flex flex-col items-center gap-2 opacity-50 hover:opacity-100">
                    <span class="text-6xl">😊</span>
                    <span>잘했어요!</span>
                </button>
                <button onclick="selectHappy(this)" class="flex flex-col items-center gap-2 opacity-50 hover:opacity-100">
                    <span class="text-6xl">😐</span>
                    <span>괜찮아요!</span>
                </button>
                <button onclick="selectHappy(this)" class="flex flex-col items-center gap-2 opacity-50 hover:opacity-100">
                    <span class="text-6xl">😢</span>
                    <span>생각해봐요!</span>
                </button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl border-2 border-yellow-300">
            <h3 class="text-2xl mb-4">✍️ 한 줄 느낌 고르기</h3>
            <div class="flex flex-col gap-2" id="feeling-list"></div>
        </div>

        <button onclick="location.reload()" class="w-full py-4 bg-blue-500 text-white text-2xl rounded-3xl btn-action">🔄 처음부터 다시 하기</button>
    </div>
</div>

<script>
    let day = 1;
    let records = [];
    let incomeSum = 0;
    let expenseSum = 0;
    let currentBalance = 0; // 현재 잔액 관리

    const feelings = [
        "🥰 돈을 아껴 써서 뿌듯하고 기분이 좋아요!",
        "🛍️ 사고 싶은 걸 직접 사서 행복했어요!",
        "🐖 다음 달에는 저금을 더 많이 하고 싶어요!",
        "😢 돈이 부족해서 조금 속상했어요.",
        "📝 앞으로는 계획을 세워서 똑똑하게 쓸래요!"
    ];

    // 표 빈칸 10줄 그리기
    function initTable
